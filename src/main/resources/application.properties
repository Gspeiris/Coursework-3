spring.datasource.url=jdbc:mysql://localhost:3306/research_tracker_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Secret Key - Replace with a strong, base64-encoded secret
jwt.secret=your-super-strong-base64-encoded-secret-key-that-is-at-least-256-bits-long
